<!DOCTYPE html>
<html>
    <style>
        .round-image{
            border: 1px solid rgba(170, 170, 170, 0);
            border-radius: 20px;
            max-width: 60%;
        }
        .img-container {
            position: relative;
            text-align: center;
            color: white;
        }
        @keyframes fade-in{  
            0%{ opacity: 0;}
            100%{opacity:1;}
        }
        .img-centered-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: aliceblue;
            opacity: 0;
            animation: fade-in 2s ease 0s 1;
            animation-fill-mode:forwards;
        }
        .text-box{
            border: 1px solid rgba(190, 18, 18, 0);
            border-radius: 20px;
            display: block;
            margin: auto;
            padding-left: 2.5%;
            padding-right: 2.5%;
            background-color:rgb(59, 59, 59);
            color:white;
            /* padding-top: 5px;
            padding-bottom: 5px; */
            box-shadow: 5px 5px 2px 1px rgba(83, 83, 83, 0.281);
            transition:color 0.5s;
            transition:background 0.5s;
        }
        .text-box-overflow{
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .text-box:hover{
            background-color:white;
            color:rgb(0, 0, 0);
            border: 1px solid rgb(59, 59, 59);
        }
    </style>

  {% include head.html %}

    <body class="theme-{% if site.resume_theme %}{{ site.resume_theme }}{% endif %} background-color-define">
    <div class="wrapper" itemscope itemtype="http://schema.org/Person">
        <p></p>
        <!-- BLOG -->
        <section class="content-section">
            <header class="section-header">
                <h2 style="font-weight: lighter;">
                    <a href="index.html" class="contact-button" style="width:100px;line-height:35px;display:inline-block;">
                        &#10094; back
                    </a> 
                    <span>Posts</span>
                </h2>
            </header>
            <div>
                <div class="resume-item-copy">

                    {% for blogs in site.data.blogs %}
                    <p>
                        <div style="width: 95%;margin-left: 2.5%;">
                            
                            <a href="blog-body.html?blog-tag={{ blogs.link-tag }}">
                            <!-- <span style="font-weight: bold;">[{{ blogs.date }}]</span> -->
                            <!-- {{ blogs.name }} -->
                            <div class="text-box">
                                <p>
                                    <div class="text-box-overflow" style="font-size: 1.rem;">{{ blogs.name }}</div>
                                    <div class="text-box-overflow" style="font-size: 0.7rem;">Date: {{ blogs.date }}</div>
                                </p>
                            </div>
                            </a> 
                    
                        </div>
                    </p>
                    {% endfor %}
                    
                </div>
            </div>
        </section>

        <footer class="page-footer">
            <div>
                <div class="img-container">
                    <img src="images/blog-background.jpg" alt="Flowers in Chania" class="round-image" id="headimage">
                    <span id="headtext" class="img-centered-text" style="font-size: 0px;">
                        かがりびはろうげつ<br>
                        篝火就如同朦朧的月
                    </span>
                </div>
            </div>
            <!-- <p class="footer-line">Made by <a href="http://twitter.com/jglovier">@jglovier</a>. Fork me on <a href="https://github.com/jglovier/resume-template">GitHub</a>.</p> -->
            <p class="footer-line">Send feedback by <a href="jiaxu.liu@ieee.org">email</a></p>
        </footer>

    </div>
    
    </body>
    <script>
        function reportWindowSize() {
            var img = document.getElementById('headimage');
            var width = img.width;
            var height = img.width;
            var text = document.getElementById("headtext");
            text.style.fontSize = width/2+"%";
        }
        window.onload = reportWindowSize;
        window.onresize = reportWindowSize;
    </script>

</html>
