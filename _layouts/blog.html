  {% include head.html %}

        <p></p>
        <!-- BLOG -->

            <header class="section-header">

                <a href="index.html" class="contact-button" style="width:100px;line-height:35px;display:inline-block;">
                    &#10094; back
                </a> 
                Blog Index
            </h2>
            </header>
            <div>
            <ul>
                {% for blogs in site.data.blogs %}

                 <a href="{{ blogs.link }}">{{ blogs.name }}</a> <span style="font-weight: bold;">({{ blogs.date }})</span>
                </li>
                {% endfor %}
            </ul>
            </div>
        </section>
