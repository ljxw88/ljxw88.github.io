  {% include head.html %}

    <body class="theme-{% if site.resume_theme %}{{ site.resume_theme }}{% endif %} background-color-define">
    <div class="wrapper" itemscope itemtype="http://schema.org/Person">
              
        <p></p>
        <!-- blog main body -->
        <section class="content-section">
            <header class="section-header">
                <h2 style="font-weight: lighter;">
                    <a href="blog-index.html" class="contact-button" style="width:100px;line-height:35px;display:inline-block;">
                        &#10094; back
                    </a> 
                    <span>Article</span>
                </h2>
            </header>
            <div>
                <div class="main-body">
                    <div id="content">
                        <div style="text-align: center;">SORRY THIS PAGE IS UNDER CONSTRUCTION</div>
                    </div>
                </div>

        </section>

        <footer class="page-footer">

        </footer>

    </body>
    <script type="text/javascript">
        function getParams(key) {
            var reg = new RegExp("(^|&)" + key + "=([^&]*)(&|$)");
            var r = window.location.search.substr(1).match(reg);
            if (r != null) {
                return unescape(r[2]);
            }
            return null;
        };
        console.log("parameter 1:"+getParams("blog-tag"));
        var tag = getParams("blog-tag");

        file_path = "blog/"+tag+"/"+tag+".html";
        $(document).ready(function(){
            $("#content").load(file_path);
        }).ajaxComplete(function(){
            MathJax.Hub.Queue(["Typeset", MathJax.Hub, "content"]);
        }).delay(1000).queue(function(){
            MathJax.Hub.Queue(["Typeset", MathJax.Hub, "content"]);
            hljs.highlightAll();
        });
        
    </script>

</html>
